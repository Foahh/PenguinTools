name: Build

on:
  push:
    branches: ['**']
    tags: ['v*']

jobs:
  build-muautils:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get muautils submodule SHA
        id: muautils-sha
        shell: bash
        run: echo "sha=$(git rev-parse HEAD:External/muautils)" >> $GITHUB_OUTPUT

      - name: Cache muautils build output
        id: cache
        uses: actions/cache@v4
        with:
          path: External/muautils/cmake-build-vcpkg/Release
          key: muautils-${{ steps.muautils-sha.outputs.sha }}

      - name: Bootstrap vcpkg
        if: steps.cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git $env:USERPROFILE\vcpkg
          & "$env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          echo "VCPKG_ROOT=$env:USERPROFILE\vcpkg" >> $env:GITHUB_ENV

      - name: Configure muautils
        if: steps.cache.outputs.cache-hit != 'true'
        shell: pwsh
        working-directory: External/muautils
        run: cmake --preset vcpkg

      - name: Build muautils
        if: steps.cache.outputs.cache-hit != 'true'
        shell: pwsh
        working-directory: External/muautils
        run: cmake --build cmake-build-vcpkg --config Release --target mua

      - name: Upload mua.exe
        uses: actions/upload-artifact@v4
        with:
          name: muautils-bin
          path: External/muautils/cmake-build-vcpkg/Release/mua.exe

  publish:
    runs-on: windows-latest
    needs: build-muautils
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download mua.exe
        uses: actions/download-artifact@v4
        with:
          name: muautils-bin
          path: External/muautils/cmake-build-vcpkg/Release

      - name: Publish all targets
        shell: pwsh
        env:
          CI: true
        run: pwsh build.ps1

      - name: Upload release zips
        uses: actions/upload-artifact@v4
        with:
          name: release-zips
          path: |
            PenguinTools/bin/Release/**/*.zip
            PenguinTools.CLI/bin/Release/**/*.zip

  release:
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download release zips
        uses: actions/download-artifact@v4
        with:
          name: release-zips
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
